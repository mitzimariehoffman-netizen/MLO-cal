<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #002B45;
  --blue: #0073CF;
  --cyan: #00A9E0;
  --digital: #00549F;
  --amber: #F0AB00;
  --red: #D52B1E;
  --light: #f4f8fb;
  --white: #ffffff;
  --text: #1a2535;
  --muted: #6b7f96;
  --border: #dce6ef;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 658px;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
  background: var(--light);
  color: var(--text);
}

.wrapper {
  width: 100%;
  height: 658px;
  display: flex;
  flex-direction: column;
  padding: 20px 24px;
  gap: 14px;
}

/* HEADER ROW */
.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-icon {
  width: 38px; height: 38px;
  background: #e0f4fb;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
}
.header-title {
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--navy);
  letter-spacing: -0.02em;
}
.header-sub {
  font-size: 0.78rem;
  color: var(--muted);
  margin-top: 1px;
}

/* MONTH SELECTOR */
.month-select {
  padding: 7px 14px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  color: var(--text);
  background: var(--white);
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
}
.month-select:focus { border-color: var(--blue); }

/* TABLE WRAP */
.table-wrap {
  background: var(--white);
  border-radius: 14px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.07);
  overflow: hidden;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.cal-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

.cal-table thead { position: sticky; top: 0; z-index: 2; }
.cal-table th {
  background: var(--navy);
  color: var(--white);
  padding: 11px 16px;
  text-align: left;
  font-size: 0.76rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.col-date    { width: 15%; }
.col-actions { width: 30%; }
.col-notes   { width: auto; }

/* SCROLLABLE BODY */
.table-scroll {
  overflow-y: auto;
  flex: 1;
  min-height: 0;
}
.table-scroll::-webkit-scrollbar { width: 6px; }
.table-scroll::-webkit-scrollbar-track { background: transparent; }
.table-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.cal-table td {
  padding: 10px 16px;
  border-bottom: 1px solid #f0f4f8;
  font-size: 0.86rem;
  vertical-align: middle;
}
.cal-table tbody tr:last-child td { border-bottom: none; }
.cal-table tbody tr:hover td { background: #f7fafd; }

.day-num {
  font-weight: 600;
  color: var(--navy);
  white-space: nowrap;
  font-size: 0.84rem;
}

/* BADGES — all use white text except print which uses dark */
.cal-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 600;
  margin: 2px 2px 2px 0;
  white-space: nowrap;
  color: #ffffff;
}
.badge-post    { background: #00A9E0; }
.badge-digital { background: #00549F; }
.badge-print   { background: #F0AB00; color: #3a2800; }
.badge-video   { background: #D52B1E; }

.notes-text {
  color: var(--navy);
  font-size: 0.84rem;
  line-height: 1.4;
}
</style>
</head>
<body>

  <div class="header-row">
    <div class="header-left">
      <div class="header-icon">📋</div>
      <div>
        <div class="header-title">Marketing Calendar</div>
        <div class="header-sub">What to post, send, and order — day by day</div>
      </div>
    </div>
    <select class="month-select" id="calMonthSelect" onchange="renderCalendar()">
      <option value="march">March 2026</option>
      <option value="april">April 2026</option>
      <option value="may">May 2026</option>
    </select>
  </div>

  <div class="table-wrap">
    <table class="cal-table">
      <thead>
        <tr>
          <th class="col-date">Date</th>
          <th class="col-actions">Actions</th>
          <th class="col-notes">Notes</th>
        </tr>
      </thead>
    </table>
    <div class="table-scroll">
      <table class="cal-table">
        <tbody id="calBody"></tbody>
      </table>
    </div>
  </div>

</div>
