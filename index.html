
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upcoming Holidays</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100%;
  height: 100%;
  font-family: 'Segoe UI', sans-serif;
  background: transparent;
  color: #002B45;
  display: flex;
  align-items: flex-start;
  justify-content: center;
}

/* MAIN WIDGET */
.widget {
  width: 100%;
  max-width: 666px;
  height: 100%;
  max-height: 665px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,43,69,0.12);
  background: #fff;
}

/* HEADER */
.header {
  background: #002B45;
  padding: 10px 14px 8px;
  flex-shrink: 0;
}

.header h1 {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #00A9E0;
  margin-bottom: 8px;
}

/* TABS */
.tabs {
  display: flex;
  gap: 2px;
}

.tab {
  flex: 1;
  padding: 7px 4px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-align: center;
  cursor: pointer;
  border: none;
  border-radius: 4px 4px 0 0;
  background: #004f7c;
  color: #cce8f4;
  text-transform: uppercase;
}

.tab.active {
  background: #f4f8fb;
  color: #002B45;
  font-weight: 700;
  border-top: 2px solid #00A9E0;
}

/* CONTENT */
.content {
  flex: 1;
  overflow: hidden;
}

.panel {
  display: none;
  height: 100%;
  overflow-y: auto;
  padding: 10px 14px 8px;
}

.panel.active { display: block; }

/* ENTRIES */
.entry {
  display: flex;
  gap: 10px;
  padding: 6px 0;
  border-bottom: 1px solid #ddeaf3;
}

.entry:last-child { border-bottom: none; }

.date-col {
  width: 72px;
  flex-shrink: 0;
}

.date-num {
  font-size: 12px;
  font-weight: 700;
  color: #0073CF;
}

.date-day {
  font-size: 9.5px;
  color: #6b8fa8;
  text-transform: uppercase;
}

.entry-text {
  font-size: 11.5px;
  line-height: 1.35;
}

/* TAGS */
.tag {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  padding: 2px 5px;
  border-radius: 2px;
  margin-left: 4px;
}

.tag-federal { background: #002B45; color: #fff; }
.tag-marketing { background: #F0AB00; color: #002B45; }
.tag-social { background: #00A9E0; color: #fff; }
.tag-order {
  background: #002B45;
  color: #fff;
  text-decoration: none;
}

/* MOBILE TUNING */
@media (max-width: 480px) {
  .widget {
    border-radius: 10px;
  }

  .entry-text {
    font-size: 11px;
  }

  .date-col {
    width: 60px;
  }
}
</style>
</head>

<body>
<div class="widget">
  <!-- your existing markup unchanged -->
</div>

<script>
function show(month, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + month).classList.add('active');
  el.classList.add('active');
}
</script>
</body>
</html>
